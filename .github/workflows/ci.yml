name: CI

on:
  push:
    branches: [main, develop, backup-before-fix-*]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # Quick checks that run on every commit
  check:
    name: Quick Checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Clippy check
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Build and test on Windows (primary platform)
  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build workspace
        run: cargo build --workspace --all-features
      
      - name: Run tests
        run: cargo test --workspace --all-features
      
      - name: Run doc tests
        run: cargo test --workspace --doc

  # Code coverage
  coverage:
    name: Code Coverage
    runs-on: windows-latest
    needs: test-windows
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-tarpaulin
        run: |
          cargo install cargo-tarpaulin
      
      - name: Generate coverage
        run: |
          cargo tarpaulin --workspace --out xml --output-dir coverage --timeout 300
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    # audit-check reports its results by creating a check run — the repo's
    # default GITHUB_TOKEN is read-only, so without this explicit grant the
    # action failed with "Resource not accessible by integration" even when
    # the audit itself found nothing.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run security audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Dependency check
  dependencies:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-deny
        run: cargo install cargo-deny
      
      - name: Check dependencies
        run: cargo deny check

  # Build for release (on main branch only)
  build-release:
    name: Build Release
    runs-on: windows-latest
    needs: [test-windows, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --release --workspace
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: buttre-windows-release
          path: |
            target/release/buttre.exe
            target/release/*.dll
          retention-days: 30

  # Build and test on Linux (ibus / X11 integration)
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libx11-dev libxi-dev libxtst-dev libxkbcommon-dev \
            libdbus-1-dev libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo test --workspace --all-features

  # Linux IME integration: proves the engine actually registers and types
  # through real input frameworks — the gap "compiles + unit tests" left
  # open (a dead IBus integration once shipped behind green CI).
  linux-integration:
    name: Linux IME Integration (IBus + Wayland)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libx11-dev libxi-dev libxtst-dev libxkbcommon-dev \
            libdbus-1-dev libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev \
            ibus dbus-x11 xvfb python3-gi gir1.2-ibus-1.0 sway

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build platform crate
        run: cargo build -p buttre-platform

      # Real ibus-daemon: registration, daemon-spawned component,
      # CreateEngine routing, and 7 typed scenarios through an InputContext
      # (telex/VNI composition, separators, backspace, release filtering,
      # Ctrl combos, live method switch).
      - name: IBus smoke (real daemon + typed scenarios)
        run: xvfb-run -a bash scripts/ci-ibus-smoke.sh

      # Headless sway: zwp_input_method_v2 binding + activation wait, and
      # the auto-detect fallback chain (seat owned -> IBus; no display ->
      # IBus). Typed input through the grab needs a focused text-input
      # client — interactive/real-hardware territory.
      - name: Wayland smoke (headless sway binding + fallback)
        run: bash scripts/ci-wayland-smoke.sh

  # Build and test on macOS (FFI bridge)
  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo test --workspace --all-features
