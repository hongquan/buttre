# cargo-deny configuration for buttre
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny crates with security vulnerabilities
vulnerability = "deny"
# Warn about unmaintained crates
unmaintained = "warn"
# Warn about crates with unsound code
unsound = "warn"
# Ignore specific advisories (use sparingly)
ignore = [
    # Example: "RUSTSEC-2020-0001",
]

[licenses]
# Allow these licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]
# Deny these licenses
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]
# Warn on copyleft licenses
copyleft = "warn"
# Allow license files to be missing (some crates embed it differently)
allow-osi-fsf-free = "both"
# Require confidence threshold for license detection
confidence-threshold = 0.8

[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "allow"
# Highlight certain crates
highlight = "all"
# Skip checking these crates for multiple versions
skip = [
    # Windows-rs has some version conflicts, allow for now
    # { name = "windows", version = "*" },
]
# Deny specific crates
deny = [
    # Example: crates known to be problematic
    # { name = "openssl", version = "*" },
]

[sources]
# Deny crates from unknown registries
unknown-registry = "deny"
# Deny crates from git sources (prefer crates.io)
unknown-git = "warn"
# Allow crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allow specific git sources if needed
allow-git = []
